# go to sleep after 10 min

CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_PM_SOFT_OFF=y

#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

#EC11 disable (no encoder)
CONFIG_EC11=n
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=n

# MOUSE
CONFIG_ZMK_POINTING=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n

CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y

#macos logo open this config
CONFIG_ZMK_DONGLE_DISPLAY_MAC_MODIFIERS=y

# Enable RGB
CONFIG_ZMK_RGB_UNDERGLOW=y

# Nord 'Frost' Blue (Hue 190-200)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=190
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=3
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=40

# Slow down effects for a 'frozen' vibe
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=1

CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y